{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:2rem">
  <div class="card" style="width:100%;max-width:420px">
    <div style="font-size:1.4rem;font-weight:700;margin-bottom:.4rem">أهلاً بعودتك 👋</div>
    <div style="color:var(--t2);font-size:.9rem;margin-bottom:1.5rem">سجّل دخولك للوصول لحسابك</div>

    <form method="post">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" name="email" required placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:.75rem;font-size:.95rem">
        تسجيل الدخول
      </button>
    </form>

    <div class="divider"></div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.85rem;font-size:.8rem;color:var(--t3)">
      <div style="margin-bottom:.4rem;font-weight:600;color:var(--t2)">حسابات تجريبية:</div>
      <div>&#128737; Admin: admin@wazifati.dz / admin2024</div>
    </div>

    <div style="text-align:center;margin-top:1.25rem;color:var(--t2);font-size:.9rem">
      ليس لديك حساب؟ <a href="/register" style="color:var(--green)">سجّل مجاناً</a>
    </div>
  </div>
</div>
{% endblock %}
