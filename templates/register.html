{% extends "base.html" %}
{% block title %}إنشاء حساب{% endblock %}
{% block extra_js %}
<script>
function selectRole(r){
  document.getElementById('roleVal').value = r;
  document.getElementById('cardSeeker').style.borderColor = r==='seeker' ? 'var(--green)' : 'var(--border)';
  document.getElementById('cardCompany').style.borderColor = r==='company' ? 'var(--green)' : 'var(--border)';
  document.getElementById('companyFields').style.display = r==='company' ? 'block' : 'none';
}
</script>
{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:2rem">
  <div class="card" style="width:100%;max-width:460px">
    <div style="font-size:1.4rem;font-weight:700;margin-bottom:.4rem">أنشئ حسابك مجاناً</div>
    <div style="color:var(--t2);font-size:.9rem;margin-bottom:1.25rem">انضم لآلاف المهنيين الجزائريين</div>

    <!-- ROLE PICKER -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem">
      <div id="cardSeeker" onclick="selectRole('seeker')" style="border:2px solid var(--green);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .2s">
        <div style="font-size:1.3rem;margin-bottom:.35rem">&#128100;</div>
        <div style="font-size:.85rem;font-weight:600">باحث عن عمل</div>
        <div style="font-size:.75rem;color:var(--t3)">مجاني دائماً</div>
      </div>
      <div id="cardCompany" onclick="selectRole('company')" style="border:2px solid var(--border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .2s">
        <div style="font-size:1.3rem;margin-bottom:.35rem">&#127970;</div>
        <div style="font-size:.85rem;font-weight:600">صاحب عمل</div>
        <div style="font-size:.75rem;color:var(--t3)">انشر وظائفك</div>
      </div>
    </div>

    <form method="post">
      <input type="hidden" name="role" id="roleVal" value="seeker">

      <div class="form-row">
        <div class="form-group">
          <label>الاسم الكامل *</label>
          <input type="text" name="full_name" required placeholder="أحمد بن علي">
        </div>
        <div class="form-group">
          <label>الولاية *</label>
          <select name="wilaya" required>
            <option value="">اختر...</option>
            {% for w in wilayas %}
            <option value="{{ w }}">{{ w }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>البريد الإلكتروني *</label>
        <input type="email" name="email" required placeholder="ahmed@example.dz">
      </div>
      <div class="form-group">
        <label>كلمة المرور *</label>
        <input type="password" name="password" required placeholder="8 أحرف على الأقل" minlength="8">
      </div>

      <!-- Company fields (hidden by default) -->
      <div id="companyFields" style="display:none">
        <div class="divider"></div>
        <div style="font-size:.85rem;font-weight:600;color:var(--t2);margin-bottom:.75rem">معلومات الشركة</div>
        <div class="form-group">
          <label>اسم الشركة *</label>
          <input type="text" name="company_name" placeholder="سوناطراك، أوراسكوم...">
        </div>
        <div class="form-group">
          <label>القطاع</label>
          <select name="sector">
            <option value="">اختر القطاع</option>
            {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:.75rem;font-size:.95rem;margin-top:.5rem">
        إنشاء الحساب &#127881;
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;color:var(--t2);font-size:.9rem">
      لديك حساب؟ <a href="/login" style="color:var(--green)">سجّل دخولك</a>
    </div>
  </div>
</div>
{% endblock %}
