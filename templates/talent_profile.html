{% extends "base.html" %}
{% block title %}ملفي المهني{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:2rem">
  <div class="card" style="width:100%;max-width:560px">
    <div style="font-size:1.4rem;font-weight:700;margin-bottom:.35rem">ملفي المهني 💼</div>
    <div style="color:var(--t2);font-size:.9rem;margin-bottom:1.5rem">أضف ملفك لتجدك الشركات</div>

    <form action="/talent/profile" method="post">
      <div class="form-row">
        <div class="form-group">
          <label>التخصص *</label>
          <select name="category" required>
            <option value="">اختر...</option>
            {% for c in categories %}
            <option value="{{ c }}" {% if talent and talent.category==c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>الولاية *</label>
          <select name="wilaya" required>
            <option value="">اختر...</option>
            {% for w in wilayas %}
            <option value="{{ w }}" {% if talent and talent.wilaya==w %}selected{% endif %}>{{ w }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>سنوات الخبرة</label>
        <select name="experience">
          {% for e in ['بدون خبرة','أقل من سنة','1-3 سنوات','3-5 سنوات','5-10 سنوات','+10 سنوات'] %}
          <option value="{{ e }}" {% if talent and talent.experience==e %}selected{% endif %}>{{ e }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>نبذة عنك</label>
        <textarea name="bio" placeholder="اكتب نبذة مختصرة عن مهاراتك وخبراتك..." style="min-height:100px">{{ talent.bio if talent else '' }}</textarea>
      </div>
      <div class="form-group">
        <label>المهارات</label>
        <input type="text" name="skills" placeholder="Python, Excel, تصميم..." value="{{ talent.skills if talent else '' }}">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
          <input type="checkbox" name="available" value="1" {% if talent and talent.available %}checked{% endif %}>
          متاح للعمل الآن ✅
        </label>
      </div>
      <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:.75rem">
        💾 حفظ الملف المهني
      </button>
    </form>
  </div>
</div>
{% endblock %}
