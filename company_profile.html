{% extends "base.html" %}
{% block title %}ملف الشركة{% endblock %}
{% block content %}
<div class="dash-layout">
  <aside class="dash-sidebar">
    <div style="display:flex;align-items:center;gap:.65rem;margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid var(--border)">
      <div style="width:38px;height:38px;border-radius:8px;background:rgba(16,185,129,.12);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700">
        {{ company.name[0] }}
      </div>
      <div style="font-weight:600;font-size:.88rem">{{ company.name }}</div>
    </div>
    <nav class="dash-menu">
      <a href="/dashboard">&#128202; نظرة عامة</a>
      <a href="/dashboard?tab=post">&#10133; نشر وظيفة</a>
      <a href="/dashboard/applications">&#128236; الطلبات</a>
      <a href="/dashboard/profile" class="active">&#127970; ملف الشركة</a>
      <div class="divider" style="margin:.65rem 0"></div>
      <a href="/logout">&#128682; خروج</a>
    </nav>
  </aside>

  <main class="dash-main">
    <div style="font-size:1.4rem;font-weight:700;margin-bottom:1.25rem">ملف الشركة</div>
    <div class="card">
      <form action="/dashboard/profile" method="post">
        <div class="form-row">
          <div class="form-group">
            <label>اسم الشركة *</label>
            <input type="text" name="name" required value="{{ company.name }}">
          </div>
          <div class="form-group">
            <label>القطاع</label>
            <select name="sector">
              {% for c in categories %}
              <option value="{{ c }}" {% if company.sector==c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>الولاية</label>
            <select name="wilaya">
              {% for w in wilayas %}
              <option value="{{ w }}" {% if company.wilaya==w %}selected{% endif %}>{{ w }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>حجم الشركة</label>
            <select name="size">
              {% for s in ['1-10','10-50','50-200','200-1000','+1000'] %}
              <option value="{{ s }}" {% if company.size==s %}selected{% endif %}>{{ s }} موظف</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>الموقع الإلكتروني</label>
          <input type="url" name="website" placeholder="https://example.dz" value="{{ company.website or '' }}">
        </div>
        <div class="form-group">
          <label>وصف الشركة</label>
          <textarea name="description" style="min-height:120px" placeholder="اكتب نبذة عن شركتك، رسالتها، وقيمها...">{{ company.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-green">&#128190; حفظ التغييرات</button>
      </form>
    </div>
  </main>
</div>
{% endblock %}
